services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ui-dev
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
  tunel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://ui:5173
    restart: always
    depends_on:
    -  ui