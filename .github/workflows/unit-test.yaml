name: Unit tests

on:
  push:
    branches:
      - "**"
  pull_request: 
    branches:
      - "main"
  workflow_dispatch:

jobs:
  lint:
     runs-on: ubuntu-latest
     defaults:
      run:
        working-directory: app
     steps:
       - name: Checkout code
         uses: actions/checkout@v4
       - name: Setup Node
         uses: actions/setup-node@v4
         with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
       - name: Install dependencies
         run: npm ci
       - name: Run unit test
         run: npm run test:unit
            
            